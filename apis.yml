specificationVersion: '0.18'
name: SAP Sales and Distribution (SD)
description: >-
  APIs for SAP Sales and Distribution module covering sales orders, pricing,
  delivery, billing, and customer management processes within SAP S/4HANA.
  These OData-based APIs enable integration with external applications for
  end-to-end order-to-cash operations.
image: https://www.sap.com/dam/application/shared/logos/sap-logo.svg
url: https://api.sap.com/sd
created: '2024'
modified: '2026-03-04'
tags:
  - Distribution
  - ERP
  - OData
  - S/4HANA
  - Sales
  - SAP
