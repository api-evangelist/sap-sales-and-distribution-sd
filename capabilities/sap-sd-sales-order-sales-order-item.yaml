naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Sales Order API — Sales Order Item
  description: 'SAP Sales and Distribution (SD) SAP Sales Order API — Sales Order Item. 4 operations. Lead operation: Retrieve
    items for a sales order. Self-contained Naftiko capability covering one Sap Sales And Distribution Sd business surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Sales Order Item
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_SALES_AND_DISTRIBUTION_SD_API_KEY: SAP_SALES_AND_DISTRIBUTION_SD_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-sd-sales-order-sales-order-item
    baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_SALES_ORDER_SRV
    description: SAP Sales and Distribution (SD) SAP Sales Order API — Sales Order Item business capability. Self-contained,
      no shared references.
    resources:
    - name: A_SalesOrder('{SalesOrder}')-to_Item
      path: /A_SalesOrder('{SalesOrder}')/to_Item
      operations:
      - name: listsalesorderitems
        method: GET
        description: Retrieve items for a sales order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SalesOrder
          in: path
          type: string
          description: Sales order number
          required: true
    - name: A_SalesOrderItem(SalesOrder='{SalesOrder}',SalesOrderItem='{SalesOrderItem}')
      path: /A_SalesOrderItem(SalesOrder='{SalesOrder}',SalesOrderItem='{SalesOrderItem}')
      operations:
      - name: getsalesorderitem
        method: GET
        description: Retrieve a single sales order item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SalesOrder
          in: path
          type: string
          description: Sales order number
          required: true
        - name: SalesOrderItem
          in: path
          type: string
          description: Sales order item number (6 characters)
          required: true
      - name: updatesalesorderitem
        method: PATCH
        description: Update a sales order item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SalesOrder
          in: path
          type: string
          description: Sales order number
          required: true
        - name: SalesOrderItem
          in: path
          type: string
          description: Sales order item number
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesalesorderitem
        method: DELETE
        description: Delete a sales order item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SalesOrder
          in: path
          type: string
          description: Sales order number
          required: true
        - name: SalesOrderItem
          in: path
          type: string
          description: Sales order item number
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-sd-sales-order-sales-order-item-rest
    port: 8080
    description: REST adapter for SAP Sales and Distribution (SD) SAP Sales Order API — Sales Order Item. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/a-salesorder-salesorder/to-item
      name: a-salesorder-salesorder-to-item
      description: REST surface for A_SalesOrder('{SalesOrder}')-to_Item.
      operations:
      - method: GET
        name: listsalesorderitems
        description: Retrieve items for a sales order
        call: sap-sd-sales-order-sales-order-item.listsalesorderitems
        with:
          SalesOrder: rest.SalesOrder
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/a-salesorderitem-salesorder-salesorder-salesorderitem-salesorderitem
      name: a-salesorderitem-salesorder-salesorder-salesorderitem-salesorderitem
      description: REST surface for A_SalesOrderItem(SalesOrder='{SalesOrder}',SalesOrderItem='{SalesOrderItem}').
      operations:
      - method: GET
        name: getsalesorderitem
        description: Retrieve a single sales order item
        call: sap-sd-sales-order-sales-order-item.getsalesorderitem
        with:
          SalesOrder: rest.SalesOrder
          SalesOrderItem: rest.SalesOrderItem
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatesalesorderitem
        description: Update a sales order item
        call: sap-sd-sales-order-sales-order-item.updatesalesorderitem
        with:
          SalesOrder: rest.SalesOrder
          SalesOrderItem: rest.SalesOrderItem
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesalesorderitem
        description: Delete a sales order item
        call: sap-sd-sales-order-sales-order-item.deletesalesorderitem
        with:
          SalesOrder: rest.SalesOrder
          SalesOrderItem: rest.SalesOrderItem
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-sd-sales-order-sales-order-item-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP Sales and Distribution (SD) SAP Sales Order API — Sales Order Item. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-items-sales-order
      description: Retrieve items for a sales order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-sales-order-sales-order-item.listsalesorderitems
      with:
        SalesOrder: tools.SalesOrder
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-single-sales-order-item
      description: Retrieve a single sales order item
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-sales-order-sales-order-item.getsalesorderitem
      with:
        SalesOrder: tools.SalesOrder
        SalesOrderItem: tools.SalesOrderItem
      outputParameters:
      - type: object
        mapping: $.
    - name: update-sales-order-item
      description: Update a sales order item
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: sap-sd-sales-order-sales-order-item.updatesalesorderitem
      with:
        SalesOrder: tools.SalesOrder
        SalesOrderItem: tools.SalesOrderItem
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-sales-order-item
      description: Delete a sales order item
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sap-sd-sales-order-sales-order-item.deletesalesorderitem
      with:
        SalesOrder: tools.SalesOrder
        SalesOrderItem: tools.SalesOrderItem
      outputParameters:
      - type: object
        mapping: $.
