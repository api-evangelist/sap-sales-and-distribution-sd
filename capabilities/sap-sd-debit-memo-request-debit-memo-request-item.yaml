naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Debit Memo Request API — Debit Memo Request Item
  description: 'SAP Sales and Distribution (SD) SAP Debit Memo Request API — Debit Memo Request Item. 1 operations. Lead operation:
    Retrieve items for a debit memo request. Self-contained Naftiko capability covering one Sap Sales And Distribution Sd
    business surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Debit Memo Request Item
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_SALES_AND_DISTRIBUTION_SD_API_KEY: SAP_SALES_AND_DISTRIBUTION_SD_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-sd-debit-memo-request-debit-memo-request-item
    baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_DEBIT_MEMO_REQUEST_SRV
    description: SAP Sales and Distribution (SD) SAP Debit Memo Request API — Debit Memo Request Item business capability.
      Self-contained, no shared references.
    resources:
    - name: A_DebitMemoRequest('{DebitMemoRequest}')-to_Item
      path: /A_DebitMemoRequest('{DebitMemoRequest}')/to_Item
      operations:
      - name: listdebitmemorequestitems
        method: GET
        description: Retrieve items for a debit memo request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: DebitMemoRequest
          in: path
          type: string
          description: Debit memo request number
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-sd-debit-memo-request-debit-memo-request-item-rest
    port: 8080
    description: REST adapter for SAP Sales and Distribution (SD) SAP Debit Memo Request API — Debit Memo Request Item. One
      Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/a-debitmemorequest-debitmemorequest/to-item
      name: a-debitmemorequest-debitmemorequest-to-item
      description: REST surface for A_DebitMemoRequest('{DebitMemoRequest}')-to_Item.
      operations:
      - method: GET
        name: listdebitmemorequestitems
        description: Retrieve items for a debit memo request
        call: sap-sd-debit-memo-request-debit-memo-request-item.listdebitmemorequestitems
        with:
          DebitMemoRequest: rest.DebitMemoRequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-sd-debit-memo-request-debit-memo-request-item-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP Sales and Distribution (SD) SAP Debit Memo Request API — Debit Memo Request Item. One
      tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-items-debit-memo-request
      description: Retrieve items for a debit memo request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-debit-memo-request-debit-memo-request-item.listdebitmemorequestitems
      with:
        DebitMemoRequest: tools.DebitMemoRequest
      outputParameters:
      - type: object
        mapping: $.
