naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Sales Contract API — Sales Contract Item
  description: 'SAP Sales and Distribution (SD) SAP Sales Contract API — Sales Contract Item. 1 operations. Lead operation:
    Retrieve items for a sales contract. Self-contained Naftiko capability covering one Sap Sales And Distribution Sd business
    surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Sales Contract Item
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_SALES_AND_DISTRIBUTION_SD_API_KEY: SAP_SALES_AND_DISTRIBUTION_SD_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-sd-sales-contract-sales-contract-item
    baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_SALES_CONTRACT_SRV
    description: SAP Sales and Distribution (SD) SAP Sales Contract API — Sales Contract Item business capability. Self-contained,
      no shared references.
    resources:
    - name: A_SalesContract('{SalesContract}')-to_Item
      path: /A_SalesContract('{SalesContract}')/to_Item
      operations:
      - name: listsalescontractitems
        method: GET
        description: Retrieve items for a sales contract
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SalesContract
          in: path
          type: string
          description: Sales contract number
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-sd-sales-contract-sales-contract-item-rest
    port: 8080
    description: REST adapter for SAP Sales and Distribution (SD) SAP Sales Contract API — Sales Contract Item. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/a-salescontract-salescontract/to-item
      name: a-salescontract-salescontract-to-item
      description: REST surface for A_SalesContract('{SalesContract}')-to_Item.
      operations:
      - method: GET
        name: listsalescontractitems
        description: Retrieve items for a sales contract
        call: sap-sd-sales-contract-sales-contract-item.listsalescontractitems
        with:
          SalesContract: rest.SalesContract
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-sd-sales-contract-sales-contract-item-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP Sales and Distribution (SD) SAP Sales Contract API — Sales Contract Item. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-items-sales-contract
      description: Retrieve items for a sales contract
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-sales-contract-sales-contract-item.listsalescontractitems
      with:
        SalesContract: tools.SalesContract
      outputParameters:
      - type: object
        mapping: $.
