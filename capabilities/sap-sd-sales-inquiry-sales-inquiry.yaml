naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Sales Inquiry API — Sales Inquiry
  description: 'SAP Sales and Distribution (SD) SAP Sales Inquiry API — Sales Inquiry. 5 operations. Lead operation: Retrieve
    a list of sales inquiries. Self-contained Naftiko capability covering one Sap Sales And Distribution Sd business surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Sales Inquiry
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_SALES_AND_DISTRIBUTION_SD_API_KEY: SAP_SALES_AND_DISTRIBUTION_SD_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-sd-sales-inquiry-sales-inquiry
    baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_SALES_INQUIRY_SRV
    description: SAP Sales and Distribution (SD) SAP Sales Inquiry API — Sales Inquiry business capability. Self-contained,
      no shared references.
    resources:
    - name: A_SalesInquiry
      path: /A_SalesInquiry
      operations:
      - name: listsalesinquiries
        method: GET
        description: Retrieve a list of sales inquiries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createsalesinquiry
        method: POST
        description: Create a new sales inquiry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: A_SalesInquiry('{SalesInquiry}')
      path: /A_SalesInquiry('{SalesInquiry}')
      operations:
      - name: getsalesinquiry
        method: GET
        description: Retrieve a single sales inquiry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SalesInquiry
          in: path
          type: string
          description: Sales inquiry number (10 characters)
          required: true
      - name: updatesalesinquiry
        method: PATCH
        description: Update a sales inquiry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SalesInquiry
          in: path
          type: string
          description: Sales inquiry number
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesalesinquiry
        method: DELETE
        description: Delete a sales inquiry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SalesInquiry
          in: path
          type: string
          description: Sales inquiry number
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-sd-sales-inquiry-sales-inquiry-rest
    port: 8080
    description: REST adapter for SAP Sales and Distribution (SD) SAP Sales Inquiry API — Sales Inquiry. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/a-salesinquiry
      name: a-salesinquiry
      description: REST surface for A_SalesInquiry.
      operations:
      - method: GET
        name: listsalesinquiries
        description: Retrieve a list of sales inquiries
        call: sap-sd-sales-inquiry-sales-inquiry.listsalesinquiries
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createsalesinquiry
        description: Create a new sales inquiry
        call: sap-sd-sales-inquiry-sales-inquiry.createsalesinquiry
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/a-salesinquiry-salesinquiry
      name: a-salesinquiry-salesinquiry
      description: REST surface for A_SalesInquiry('{SalesInquiry}').
      operations:
      - method: GET
        name: getsalesinquiry
        description: Retrieve a single sales inquiry
        call: sap-sd-sales-inquiry-sales-inquiry.getsalesinquiry
        with:
          SalesInquiry: rest.SalesInquiry
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatesalesinquiry
        description: Update a sales inquiry
        call: sap-sd-sales-inquiry-sales-inquiry.updatesalesinquiry
        with:
          SalesInquiry: rest.SalesInquiry
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesalesinquiry
        description: Delete a sales inquiry
        call: sap-sd-sales-inquiry-sales-inquiry.deletesalesinquiry
        with:
          SalesInquiry: rest.SalesInquiry
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-sd-sales-inquiry-sales-inquiry-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP Sales and Distribution (SD) SAP Sales Inquiry API — Sales Inquiry. One tool per consumed
      operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-list-sales-inquiries
      description: Retrieve a list of sales inquiries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-sales-inquiry-sales-inquiry.listsalesinquiries
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-sales-inquiry
      description: Create a new sales inquiry
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sap-sd-sales-inquiry-sales-inquiry.createsalesinquiry
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-single-sales-inquiry
      description: Retrieve a single sales inquiry
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-sales-inquiry-sales-inquiry.getsalesinquiry
      with:
        SalesInquiry: tools.SalesInquiry
      outputParameters:
      - type: object
        mapping: $.
    - name: update-sales-inquiry
      description: Update a sales inquiry
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: sap-sd-sales-inquiry-sales-inquiry.updatesalesinquiry
      with:
        SalesInquiry: tools.SalesInquiry
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-sales-inquiry
      description: Delete a sales inquiry
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: sap-sd-sales-inquiry-sales-inquiry.deletesalesinquiry
      with:
        SalesInquiry: tools.SalesInquiry
      outputParameters:
      - type: object
        mapping: $.
