naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Credit Memo Request API — Credit Memo Request Item
  description: 'SAP Sales and Distribution (SD) SAP Credit Memo Request API — Credit Memo Request Item. 1 operations. Lead
    operation: Retrieve items for a credit memo request. Self-contained Naftiko capability covering one Sap Sales And Distribution
    Sd business surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Credit Memo Request Item
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_SALES_AND_DISTRIBUTION_SD_API_KEY: SAP_SALES_AND_DISTRIBUTION_SD_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-sd-credit-memo-request-credit-memo-request-item
    baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_CREDIT_MEMO_REQUEST_SRV
    description: SAP Sales and Distribution (SD) SAP Credit Memo Request API — Credit Memo Request Item business capability.
      Self-contained, no shared references.
    resources:
    - name: A_CreditMemoRequest('{CreditMemoRequest}')-to_Item
      path: /A_CreditMemoRequest('{CreditMemoRequest}')/to_Item
      operations:
      - name: listcreditmemorequestitems
        method: GET
        description: Retrieve items for a credit memo request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: CreditMemoRequest
          in: path
          type: string
          description: Credit memo request number
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-sd-credit-memo-request-credit-memo-request-item-rest
    port: 8080
    description: REST adapter for SAP Sales and Distribution (SD) SAP Credit Memo Request API — Credit Memo Request Item.
      One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/a-creditmemorequest-creditmemorequest/to-item
      name: a-creditmemorequest-creditmemorequest-to-item
      description: REST surface for A_CreditMemoRequest('{CreditMemoRequest}')-to_Item.
      operations:
      - method: GET
        name: listcreditmemorequestitems
        description: Retrieve items for a credit memo request
        call: sap-sd-credit-memo-request-credit-memo-request-item.listcreditmemorequestitems
        with:
          CreditMemoRequest: rest.CreditMemoRequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-sd-credit-memo-request-credit-memo-request-item-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP Sales and Distribution (SD) SAP Credit Memo Request API — Credit Memo Request Item. One
      tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-items-credit-memo-request
      description: Retrieve items for a credit memo request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-credit-memo-request-credit-memo-request-item.listcreditmemorequestitems
      with:
        CreditMemoRequest: tools.CreditMemoRequest
      outputParameters:
      - type: object
        mapping: $.
