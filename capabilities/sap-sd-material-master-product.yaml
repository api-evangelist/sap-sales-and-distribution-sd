naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Material Master (Product) API — Product
  description: 'SAP Sales and Distribution (SD) SAP Material Master (Product) API — Product. 4 operations. Lead operation:
    Retrieve a list of products. Self-contained Naftiko capability covering one Sap Sales And Distribution Sd business surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Product
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_SALES_AND_DISTRIBUTION_SD_API_KEY: SAP_SALES_AND_DISTRIBUTION_SD_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-sd-material-master-product
    baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_PRODUCT_SRV
    description: SAP Sales and Distribution (SD) SAP Material Master (Product) API — Product business capability. Self-contained,
      no shared references.
    resources:
    - name: A_Product
      path: /A_Product
      operations:
      - name: listproducts
        method: GET
        description: Retrieve a list of products
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createproduct
        method: POST
        description: Create a new product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: A_Product('{Product}')
      path: /A_Product('{Product}')
      operations:
      - name: getproduct
        method: GET
        description: Retrieve a single product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Product
          in: path
          type: string
          description: Material number (40 characters)
          required: true
      - name: updateproduct
        method: PATCH
        description: Update a product
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Product
          in: path
          type: string
          description: Material number
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-sd-material-master-product-rest
    port: 8080
    description: REST adapter for SAP Sales and Distribution (SD) SAP Material Master (Product) API — Product. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/a-product
      name: a-product
      description: REST surface for A_Product.
      operations:
      - method: GET
        name: listproducts
        description: Retrieve a list of products
        call: sap-sd-material-master-product.listproducts
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createproduct
        description: Create a new product
        call: sap-sd-material-master-product.createproduct
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/a-product-product
      name: a-product-product
      description: REST surface for A_Product('{Product}').
      operations:
      - method: GET
        name: getproduct
        description: Retrieve a single product
        call: sap-sd-material-master-product.getproduct
        with:
          Product: rest.Product
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateproduct
        description: Update a product
        call: sap-sd-material-master-product.updateproduct
        with:
          Product: rest.Product
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-sd-material-master-product-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP Sales and Distribution (SD) SAP Material Master (Product) API — Product. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-list-products
      description: Retrieve a list of products
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-material-master-product.listproducts
      outputParameters:
      - type: object
        mapping: $.
    - name: create-new-product
      description: Create a new product
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sap-sd-material-master-product.createproduct
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-single-product
      description: Retrieve a single product
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-material-master-product.getproduct
      with:
        Product: tools.Product
      outputParameters:
      - type: object
        mapping: $.
    - name: update-product
      description: Update a product
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: sap-sd-material-master-product.updateproduct
      with:
        Product: tools.Product
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
