naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Credit Management API — Credit Exposure
  description: 'SAP Sales and Distribution (SD) SAP Credit Management API — Credit Exposure. 1 operations. Lead operation:
    Retrieve credit exposure for a business partner. Self-contained Naftiko capability covering one Sap Sales And Distribution
    Sd business surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Credit Exposure
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_SALES_AND_DISTRIBUTION_SD_API_KEY: SAP_SALES_AND_DISTRIBUTION_SD_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-sd-credit-management-credit-exposure
    baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_CREDIT_MANAGEMENT
    description: SAP Sales and Distribution (SD) SAP Credit Management API — Credit Exposure business capability. Self-contained,
      no shared references.
    resources:
    - name: A_CrdtMgmtCreditExposure(BusinessPartner='{BusinessPartner}',CreditSegment='{Cre
      path: /A_CrdtMgmtCreditExposure(BusinessPartner='{BusinessPartner}',CreditSegment='{CreditSegment}')
      operations:
      - name: getcreditexposure
        method: GET
        description: Retrieve credit exposure for a business partner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: BusinessPartner
          in: path
          type: string
          description: Business partner number
          required: true
        - name: CreditSegment
          in: path
          type: string
          description: Credit segment
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-sd-credit-management-credit-exposure-rest
    port: 8080
    description: REST adapter for SAP Sales and Distribution (SD) SAP Credit Management API — Credit Exposure. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/a-crdtmgmtcreditexposure-businesspartner-businesspartner-creditsegment-creditsegment
      name: a-crdtmgmtcreditexposure-businesspartner-businesspartner-creditsegment-cre
      description: REST surface for A_CrdtMgmtCreditExposure(BusinessPartner='{BusinessPartner}',CreditSegment='{Cre.
      operations:
      - method: GET
        name: getcreditexposure
        description: Retrieve credit exposure for a business partner
        call: sap-sd-credit-management-credit-exposure.getcreditexposure
        with:
          BusinessPartner: rest.BusinessPartner
          CreditSegment: rest.CreditSegment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-sd-credit-management-credit-exposure-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP Sales and Distribution (SD) SAP Credit Management API — Credit Exposure. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-credit-exposure-business-partner
      description: Retrieve credit exposure for a business partner
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-credit-management-credit-exposure.getcreditexposure
      with:
        BusinessPartner: tools.BusinessPartner
        CreditSegment: tools.CreditSegment
      outputParameters:
      - type: object
        mapping: $.
