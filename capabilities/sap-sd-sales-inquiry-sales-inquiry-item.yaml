naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Sales Inquiry API — Sales Inquiry Item
  description: 'SAP Sales and Distribution (SD) SAP Sales Inquiry API — Sales Inquiry Item. 1 operations. Lead operation:
    Retrieve items for a sales inquiry. Self-contained Naftiko capability covering one Sap Sales And Distribution Sd business
    surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Sales Inquiry Item
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_SALES_AND_DISTRIBUTION_SD_API_KEY: SAP_SALES_AND_DISTRIBUTION_SD_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-sd-sales-inquiry-sales-inquiry-item
    baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_SALES_INQUIRY_SRV
    description: SAP Sales and Distribution (SD) SAP Sales Inquiry API — Sales Inquiry Item business capability. Self-contained,
      no shared references.
    resources:
    - name: A_SalesInquiry('{SalesInquiry}')-to_Item
      path: /A_SalesInquiry('{SalesInquiry}')/to_Item
      operations:
      - name: listsalesinquiryitems
        method: GET
        description: Retrieve items for a sales inquiry
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SalesInquiry
          in: path
          type: string
          description: Sales inquiry number
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-sd-sales-inquiry-sales-inquiry-item-rest
    port: 8080
    description: REST adapter for SAP Sales and Distribution (SD) SAP Sales Inquiry API — Sales Inquiry Item. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/a-salesinquiry-salesinquiry/to-item
      name: a-salesinquiry-salesinquiry-to-item
      description: REST surface for A_SalesInquiry('{SalesInquiry}')-to_Item.
      operations:
      - method: GET
        name: listsalesinquiryitems
        description: Retrieve items for a sales inquiry
        call: sap-sd-sales-inquiry-sales-inquiry-item.listsalesinquiryitems
        with:
          SalesInquiry: rest.SalesInquiry
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-sd-sales-inquiry-sales-inquiry-item-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP Sales and Distribution (SD) SAP Sales Inquiry API — Sales Inquiry Item. One tool per
      consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-items-sales-inquiry
      description: Retrieve items for a sales inquiry
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-sales-inquiry-sales-inquiry-item.listsalesinquiryitems
      with:
        SalesInquiry: tools.SalesInquiry
      outputParameters:
      - type: object
        mapping: $.
