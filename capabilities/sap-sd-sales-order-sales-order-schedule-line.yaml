naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Sales Order API — Sales Order Schedule Line
  description: 'SAP Sales and Distribution (SD) SAP Sales Order API — Sales Order Schedule Line. 1 operations. Lead operation:
    Retrieve a schedule line. Self-contained Naftiko capability covering one Sap Sales And Distribution Sd business surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Sales Order Schedule Line
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_SALES_AND_DISTRIBUTION_SD_API_KEY: SAP_SALES_AND_DISTRIBUTION_SD_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-sd-sales-order-sales-order-schedule-line
    baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_SALES_ORDER_SRV
    description: SAP Sales and Distribution (SD) SAP Sales Order API — Sales Order Schedule Line business capability. Self-contained,
      no shared references.
    resources:
    - name: A_SalesOrderScheduleLine(SalesOrder='{SalesOrder}',SalesOrderItem='{SalesOrderIt
      path: /A_SalesOrderScheduleLine(SalesOrder='{SalesOrder}',SalesOrderItem='{SalesOrderItem}',ScheduleLine='{ScheduleLine}')
      operations:
      - name: getsalesorderscheduleline
        method: GET
        description: Retrieve a schedule line
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SalesOrder
          in: path
          type: string
          description: Sales order number
          required: true
        - name: SalesOrderItem
          in: path
          type: string
          description: Sales order item number
          required: true
        - name: ScheduleLine
          in: path
          type: string
          description: Schedule line number
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-sd-sales-order-sales-order-schedule-line-rest
    port: 8080
    description: REST adapter for SAP Sales and Distribution (SD) SAP Sales Order API — Sales Order Schedule Line. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/a-salesorderscheduleline-salesorder-salesorder-salesorderitem-salesorderitem-scheduleline-scheduleline
      name: a-salesorderscheduleline-salesorder-salesorder-salesorderitem-salesorderit
      description: REST surface for A_SalesOrderScheduleLine(SalesOrder='{SalesOrder}',SalesOrderItem='{SalesOrderIt.
      operations:
      - method: GET
        name: getsalesorderscheduleline
        description: Retrieve a schedule line
        call: sap-sd-sales-order-sales-order-schedule-line.getsalesorderscheduleline
        with:
          SalesOrder: rest.SalesOrder
          SalesOrderItem: rest.SalesOrderItem
          ScheduleLine: rest.ScheduleLine
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-sd-sales-order-sales-order-schedule-line-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP Sales and Distribution (SD) SAP Sales Order API — Sales Order Schedule Line. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-schedule-line
      description: Retrieve a schedule line
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-sales-order-sales-order-schedule-line.getsalesorderscheduleline
      with:
        SalesOrder: tools.SalesOrder
        SalesOrderItem: tools.SalesOrderItem
        ScheduleLine: tools.ScheduleLine
      outputParameters:
      - type: object
        mapping: $.
