naftiko: "1.0.0-alpha1"

info:
  label: "SAP SD Pricing API"
  description: >-
    Calculate prices, discounts, and surcharges based on pricing conditions
    in SAP S/4HANA. Manages sales pricing condition records used to determine
    prices in sales documents.
  tags:
    - SAP
    - Pricing
    - Conditions
    - Discount
    - OData
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_SD_API_KEY: SAP_SD_API_KEY

capability:
  consumes:
    - type: http
      namespace: pricing
      baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_SLSPRCGCONDITIONRECORD_SRV
      description: "SAP S/4HANA Pricing Condition Record OData service"
      authentication:
        type: apikey
        key: APIKey
        value: "{{SAP_SD_API_KEY}}"
        placement: header
      resources:
        - name: pricing-conditions
          path: /A_SlsPricingConditionRecord
          description: Pricing condition record collection
          operations:
            - name: list-pricing-condition-records
              method: GET
              description: Retrieve a list of pricing condition records
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of records to return
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: OData filter expression
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-pricing-condition-record
              method: POST
              description: Create a pricing condition record
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  ConditionType: "{{tools.ConditionType}}"
                  ConditionRateValue: "{{tools.ConditionRateValue}}"
                  ConditionCurrency: "{{tools.ConditionCurrency}}"

        - name: pricing-condition-by-id
          path: /A_SlsPricingConditionRecord('{ConditionRecord}')
          description: Single pricing condition record
          operations:
            - name: get-pricing-condition-record
              method: GET
              description: Retrieve a single pricing condition record
              inputParameters:
                - name: ConditionRecord
                  in: path
                  type: string
                  required: true
                  description: Condition record number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-pricing-condition-record
              method: PATCH
              description: Update a pricing condition record
              inputParameters:
                - name: ConditionRecord
                  in: path
                  type: string
                  required: true
                  description: Condition record number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-pricing-condition-record
              method: DELETE
              description: Delete a pricing condition record
              inputParameters:
                - name: ConditionRecord
                  in: path
                  type: string
                  required: true
                  description: Condition record number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8184
      namespace: sd-pricing-api
      resources:
        - path: /v1/pricing-conditions
          operations:
            - method: GET
              name: list-pricing-condition-records
              description: List pricing condition records
              call: "pricing.list-pricing-condition-records"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9184
      namespace: sd-pricing-mcp
      transport: http
      tools:
        - name: list-pricing-conditions
          description: List pricing condition records from SAP S/4HANA
          hints:
            readOnly: true
            openWorld: true
          call: "pricing.list-pricing-condition-records"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-pricing-condition
          description: Get a specific pricing condition record
          hints:
            readOnly: true
            openWorld: false
          call: "pricing.get-pricing-condition-record"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-pricing-condition
          description: Create a new pricing condition record
          hints:
            readOnly: false
            destructive: false
          call: "pricing.create-pricing-condition-record"
          outputParameters:
            - type: object
              mapping: "$."
