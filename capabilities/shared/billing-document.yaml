naftiko: "1.0.0-alpha1"

info:
  label: "SAP SD Billing Document API"
  description: >-
    Create and manage billing documents, invoices, credit memos, and debit memos
    in SAP S/4HANA. Supports billing document processing as part of the
    order-to-cash cycle.
  tags:
    - SAP
    - Billing
    - Invoice
    - OData
    - S/4HANA
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_SD_API_KEY: SAP_SD_API_KEY

capability:
  consumes:
    - type: http
      namespace: billing-document
      baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_BILLING_DOCUMENT_SRV
      description: "SAP S/4HANA Billing Document OData service"
      authentication:
        type: apikey
        key: APIKey
        value: "{{SAP_SD_API_KEY}}"
        placement: header
      resources:
        - name: billing-documents
          path: /A_BillingDocument
          description: Billing document collection
          operations:
            - name: list-billing-documents
              method: GET
              description: Retrieve a list of billing documents
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of records to return
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: OData filter expression
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: billing-document-by-id
          path: /A_BillingDocument('{BillingDocument}')
          description: Single billing document
          operations:
            - name: get-billing-document
              method: GET
              description: Retrieve a single billing document
              inputParameters:
                - name: BillingDocument
                  in: path
                  type: string
                  required: true
                  description: Billing document number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: cancel-billing-document
          path: /A_BillingDocument('{BillingDocument}')/Cancel
          description: Cancel a billing document
          operations:
            - name: cancel-billing-document
              method: POST
              description: Cancel a billing document
              inputParameters:
                - name: BillingDocument
                  in: path
                  type: string
                  required: true
                  description: Billing document number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8181
      namespace: sd-billing-api
      resources:
        - path: /v1/billing-documents
          operations:
            - method: GET
              name: list-billing-documents
              description: List billing documents
              call: "billing-document.list-billing-documents"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9181
      namespace: sd-billing-mcp
      transport: http
      tools:
        - name: list-billing-documents
          description: List billing documents from SAP S/4HANA
          hints:
            readOnly: true
            openWorld: true
          call: "billing-document.list-billing-documents"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-billing-document
          description: Get a specific billing document
          hints:
            readOnly: true
            openWorld: false
          call: "billing-document.get-billing-document"
          outputParameters:
            - type: object
              mapping: "$."
        - name: cancel-billing-document
          description: Cancel a billing document
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "billing-document.cancel-billing-document"
          outputParameters:
            - type: object
              mapping: "$."
