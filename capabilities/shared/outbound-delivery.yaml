naftiko: "1.0.0-alpha1"

info:
  label: "SAP SD Outbound Delivery API"
  description: >-
    Create and manage outbound deliveries, goods issue, and shipping documents
    in SAP S/4HANA. Supports delivery creation with reference to sales orders
    and subsequent logistics processing.
  tags:
    - SAP
    - Delivery
    - Logistics
    - Shipping
    - OData
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_SD_API_KEY: SAP_SD_API_KEY

capability:
  consumes:
    - type: http
      namespace: outbound-delivery
      baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_OUTBOUND_DELIVERY_SRV
      description: "SAP S/4HANA Outbound Delivery OData service"
      authentication:
        type: apikey
        key: APIKey
        value: "{{SAP_SD_API_KEY}}"
        placement: header
      resources:
        - name: deliveries
          path: /A_OutbDeliveryHeader
          description: Outbound delivery collection
          operations:
            - name: list-outbound-deliveries
              method: GET
              description: Retrieve a list of outbound deliveries
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of records to return
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: OData filter expression
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-outbound-delivery
              method: POST
              description: Create a new outbound delivery
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  ShipToParty: "{{tools.ShipToParty}}"
                  ShippingPoint: "{{tools.ShippingPoint}}"

        - name: delivery-by-id
          path: /A_OutbDeliveryHeader(DeliveryDocument='{DeliveryDocument}')
          description: Single outbound delivery
          operations:
            - name: get-outbound-delivery
              method: GET
              description: Retrieve a single outbound delivery
              inputParameters:
                - name: DeliveryDocument
                  in: path
                  type: string
                  required: true
                  description: Delivery document number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: post-goods-issue
          path: /PostGoodsIssue
          description: Post goods issue for delivery
          operations:
            - name: post-goods-issue
              method: POST
              description: Post goods issue for an outbound delivery
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  DeliveryDocument: "{{tools.DeliveryDocument}}"

  exposes:
    - type: rest
      port: 8183
      namespace: sd-outbound-delivery-api
      resources:
        - path: /v1/outbound-deliveries
          operations:
            - method: GET
              name: list-outbound-deliveries
              description: List outbound deliveries
              call: "outbound-delivery.list-outbound-deliveries"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9183
      namespace: sd-outbound-delivery-mcp
      transport: http
      tools:
        - name: list-outbound-deliveries
          description: List outbound deliveries from SAP S/4HANA
          hints:
            readOnly: true
            openWorld: true
          call: "outbound-delivery.list-outbound-deliveries"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-outbound-delivery
          description: Get a specific outbound delivery
          hints:
            readOnly: true
            openWorld: false
          call: "outbound-delivery.get-outbound-delivery"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-outbound-delivery
          description: Create a new outbound delivery
          hints:
            readOnly: false
            destructive: false
          call: "outbound-delivery.create-outbound-delivery"
          outputParameters:
            - type: object
              mapping: "$."
        - name: post-goods-issue
          description: Post goods issue for an outbound delivery
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "outbound-delivery.post-goods-issue"
          outputParameters:
            - type: object
              mapping: "$."
