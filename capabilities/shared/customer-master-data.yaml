naftiko: "1.0.0-alpha1"

info:
  label: "SAP SD Customer Master Data API"
  description: >-
    Manage customer master data including business partners, addresses,
    contact information, and customer sales area data in SAP S/4HANA.
  tags:
    - SAP
    - Customer Data
    - Business Partner
    - Master Data
    - OData
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_SD_API_KEY: SAP_SD_API_KEY

capability:
  consumes:
    - type: http
      namespace: customer-master-data
      baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_BUSINESS_PARTNER
      description: "SAP S/4HANA Business Partner OData service"
      authentication:
        type: apikey
        key: APIKey
        value: "{{SAP_SD_API_KEY}}"
        placement: header
      resources:
        - name: business-partners
          path: /A_BusinessPartner
          description: Business partner collection
          operations:
            - name: list-business-partners
              method: GET
              description: Retrieve a list of business partners
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of records to return
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: OData filter expression
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-business-partner
              method: POST
              description: Create a new business partner
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  BusinessPartnerCategory: "{{tools.BusinessPartnerCategory}}"
                  BusinessPartnerGrouping: "{{tools.BusinessPartnerGrouping}}"

        - name: business-partner-by-id
          path: /A_BusinessPartner('{BusinessPartner}')
          description: Single business partner
          operations:
            - name: get-business-partner
              method: GET
              description: Retrieve a single business partner
              inputParameters:
                - name: BusinessPartner
                  in: path
                  type: string
                  required: true
                  description: Business partner number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-business-partner
              method: PATCH
              description: Update a business partner
              inputParameters:
                - name: BusinessPartner
                  in: path
                  type: string
                  required: true
                  description: Business partner number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8182
      namespace: sd-customer-api
      resources:
        - path: /v1/customers
          operations:
            - method: GET
              name: list-business-partners
              description: List business partners / customers
              call: "customer-master-data.list-business-partners"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-business-partner
              description: Create a new business partner
              call: "customer-master-data.create-business-partner"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9182
      namespace: sd-customer-mcp
      transport: http
      tools:
        - name: list-customers
          description: List business partners and customers from SAP S/4HANA
          hints:
            readOnly: true
            openWorld: true
          call: "customer-master-data.list-business-partners"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-customer
          description: Get a specific business partner / customer
          hints:
            readOnly: true
            openWorld: false
          call: "customer-master-data.get-business-partner"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-customer
          description: Create a new business partner / customer
          hints:
            readOnly: false
            destructive: false
          call: "customer-master-data.create-business-partner"
          outputParameters:
            - type: object
              mapping: "$."
