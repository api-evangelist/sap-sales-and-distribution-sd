naftiko: "1.0.0-alpha1"

info:
  label: "SAP SD Sales Order API"
  description: >-
    Create, read, update, and delete sales orders in SAP S/4HANA via the
    API_SALES_ORDER_SRV OData service. Supports full CRUD on sales order
    headers, items, partners, pricing elements, and schedule lines.
  tags:
    - SAP
    - Sales Orders
    - OData
    - S/4HANA
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_SD_API_KEY: SAP_SD_API_KEY

capability:
  consumes:
    - type: http
      namespace: sales-order
      baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_SALES_ORDER_SRV
      description: "SAP S/4HANA Sales Order OData service"
      authentication:
        type: apikey
        key: APIKey
        value: "{{SAP_SD_API_KEY}}"
        placement: header
      resources:
        - name: sales-orders
          path: /A_SalesOrder
          description: Sales order header collection
          operations:
            - name: list-sales-orders
              method: GET
              description: Retrieve a list of sales orders
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of records to return
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: Number of records to skip
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: OData filter expression
                - name: $expand
                  in: query
                  type: string
                  required: false
                  description: Navigation properties to expand
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-sales-order
              method: POST
              description: Create a new sales order
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  SalesOrderType: "{{tools.SalesOrderType}}"
                  SalesOrganization: "{{tools.SalesOrganization}}"
                  DistributionChannel: "{{tools.DistributionChannel}}"
                  OrganizationDivision: "{{tools.OrganizationDivision}}"

        - name: sales-order-by-id
          path: /A_SalesOrder('{SalesOrder}')
          description: Single sales order by ID
          operations:
            - name: get-sales-order
              method: GET
              description: Retrieve a single sales order
              inputParameters:
                - name: SalesOrder
                  in: path
                  type: string
                  required: true
                  description: Sales order number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-sales-order
              method: PATCH
              description: Update a sales order
              inputParameters:
                - name: SalesOrder
                  in: path
                  type: string
                  required: true
                  description: Sales order number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-sales-order
              method: DELETE
              description: Delete a sales order
              inputParameters:
                - name: SalesOrder
                  in: path
                  type: string
                  required: true
                  description: Sales order number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: sales-order-items
          path: /A_SalesOrder('{SalesOrder}')/to_Item
          description: Sales order items
          operations:
            - name: list-sales-order-items
              method: GET
              description: Retrieve items for a sales order
              inputParameters:
                - name: SalesOrder
                  in: path
                  type: string
                  required: true
                  description: Sales order number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8180
      namespace: sd-sales-order-api
      resources:
        - path: /v1/sales-orders
          operations:
            - method: GET
              name: list-sales-orders
              description: List all sales orders
              call: "sales-order.list-sales-orders"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-sales-order
              description: Create a new sales order
              call: "sales-order.create-sales-order"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/sales-orders/{id}
          operations:
            - method: GET
              name: get-sales-order
              description: Get a single sales order
              call: "sales-order.get-sales-order"
              with:
                SalesOrder: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9180
      namespace: sd-sales-order-mcp
      transport: http
      tools:
        - name: list-sales-orders
          description: List sales orders from SAP S/4HANA
          hints:
            readOnly: true
            openWorld: true
          call: "sales-order.list-sales-orders"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-sales-order
          description: Create a new sales order in SAP S/4HANA
          hints:
            readOnly: false
            destructive: false
          call: "sales-order.create-sales-order"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-sales-order
          description: Get a specific sales order by number
          hints:
            readOnly: true
            openWorld: false
          call: "sales-order.get-sales-order"
          outputParameters:
            - type: object
              mapping: "$."
