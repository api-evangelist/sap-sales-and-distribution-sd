naftiko: "1.0.0-alpha1"

info:
  label: "SAP SD Credit Management API"
  description: >-
    Manage customer credit limits, credit exposure, and credit checks in
    SAP S/4HANA. Enables automated credit risk assessment during sales
    order processing.
  tags:
    - SAP
    - Credit Management
    - Finance
    - Risk Management
    - OData
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SAP_SD_API_KEY: SAP_SD_API_KEY

capability:
  consumes:
    - type: http
      namespace: credit-management
      baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_CREDIT_MANAGEMENT
      description: "SAP S/4HANA Credit Management OData service"
      authentication:
        type: apikey
        key: APIKey
        value: "{{SAP_SD_API_KEY}}"
        placement: header
      resources:
        - name: credit-accounts
          path: /A_CreditMgmtAccount
          description: Credit management account collection
          operations:
            - name: list-credit-accounts
              method: GET
              description: Retrieve a list of credit management accounts
              inputParameters:
                - name: $top
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of records to return
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: OData filter expression
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: credit-account-by-id
          path: /A_CreditMgmtAccount('{CreditControlArea}','{BusinessPartner}')
          description: Single credit management account
          operations:
            - name: get-credit-account
              method: GET
              description: Retrieve a single credit management account
              inputParameters:
                - name: CreditControlArea
                  in: path
                  type: string
                  required: true
                  description: Credit control area
                - name: BusinessPartner
                  in: path
                  type: string
                  required: true
                  description: Business partner number
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: credit-limits
          path: /A_CreditMgmtAccountMemo
          description: Credit limits collection
          operations:
            - name: list-credit-limits
              method: GET
              description: Retrieve credit limits
              inputParameters:
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: OData filter expression
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8185
      namespace: sd-credit-management-api
      resources:
        - path: /v1/credit-accounts
          operations:
            - method: GET
              name: list-credit-accounts
              description: List credit management accounts
              call: "credit-management.list-credit-accounts"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9185
      namespace: sd-credit-management-mcp
      transport: http
      tools:
        - name: list-credit-accounts
          description: List credit management accounts from SAP S/4HANA
          hints:
            readOnly: true
            openWorld: true
          call: "credit-management.list-credit-accounts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-credit-account
          description: Get a specific credit management account
          hints:
            readOnly: true
            openWorld: false
          call: "credit-management.get-credit-account"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-credit-limits
          description: List credit limits for customers
          hints:
            readOnly: true
            openWorld: true
          call: "credit-management.list-credit-limits"
          outputParameters:
            - type: object
              mapping: "$."
