naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Customer Master Data (Business Partner) API — Business Partner Address
  description: 'SAP Sales and Distribution (SD) SAP Customer Master Data (Business Partner) API — Business Partner Address.
    2 operations. Lead operation: Retrieve addresses for a business partner. Self-contained Naftiko capability covering one
    Sap Sales And Distribution Sd business surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Business Partner Address
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_SALES_AND_DISTRIBUTION_SD_API_KEY: SAP_SALES_AND_DISTRIBUTION_SD_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-sd-customer-master-data-business-partner-address
    baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_BUSINESS_PARTNER
    description: SAP Sales and Distribution (SD) SAP Customer Master Data (Business Partner) API — Business Partner Address
      business capability. Self-contained, no shared references.
    resources:
    - name: A_BusinessPartner('{BusinessPartner}')-to_BusinessPartnerAddress
      path: /A_BusinessPartner('{BusinessPartner}')/to_BusinessPartnerAddress
      operations:
      - name: listbusinesspartneraddresses
        method: GET
        description: Retrieve addresses for a business partner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: BusinessPartner
          in: path
          type: string
          description: Business partner number
          required: true
      - name: createbusinesspartneraddress
        method: POST
        description: Create an address for a business partner
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: BusinessPartner
          in: path
          type: string
          description: Business partner number
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-sd-customer-master-data-business-partner-address-rest
    port: 8080
    description: REST adapter for SAP Sales and Distribution (SD) SAP Customer Master Data (Business Partner) API — Business
      Partner Address. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/a-businesspartner-businesspartner/to-businesspartneraddress
      name: a-businesspartner-businesspartner-to-businesspartneraddress
      description: REST surface for A_BusinessPartner('{BusinessPartner}')-to_BusinessPartnerAddress.
      operations:
      - method: GET
        name: listbusinesspartneraddresses
        description: Retrieve addresses for a business partner
        call: sap-sd-customer-master-data-business-partner-address.listbusinesspartneraddresses
        with:
          BusinessPartner: rest.BusinessPartner
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbusinesspartneraddress
        description: Create an address for a business partner
        call: sap-sd-customer-master-data-business-partner-address.createbusinesspartneraddress
        with:
          BusinessPartner: rest.BusinessPartner
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-sd-customer-master-data-business-partner-address-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP Sales and Distribution (SD) SAP Customer Master Data (Business Partner) API — Business
      Partner Address. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-addresses-business-partner
      description: Retrieve addresses for a business partner
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-customer-master-data-business-partner-address.listbusinesspartneraddresses
      with:
        BusinessPartner: tools.BusinessPartner
      outputParameters:
      - type: object
        mapping: $.
    - name: create-address-business-partner
      description: Create an address for a business partner
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: sap-sd-customer-master-data-business-partner-address.createbusinesspartneraddress
      with:
        BusinessPartner: tools.BusinessPartner
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
