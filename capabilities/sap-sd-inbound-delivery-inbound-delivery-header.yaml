        description: Retrieve a single inbound delivery
        call: sap-sd-inbound-delivery-inbound-delivery-header.getinbounddelivery
        with:
          DeliveryDocument: rest.DeliveryDocument
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateinbounddelivery
        description: Update an inbound delivery
        call: sap-sd-inbound-delivery-inbound-delivery-header.updateinbounddelivery
        with:
          DeliveryDocument: rest.DeliveryDocument
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteinbounddelivery
        description: Delete an inbound delivery
        call: sap-sd-inbound-delivery-inbound-delivery-header.deleteinbounddelivery
        with:
          DeliveryDocument: rest.DeliveryDocument
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/postgoodsreceipt
      name: postgoodsreceipt
      description: REST surface for PostGoodsReceipt.
      operations:
      - method: POST
        name: postgoodsreceipt
        description: Post goods receipt for an inbound delivery
        call: sap-sd-inbound-delivery-inbound-delivery-header.postgoodsreceipt
        with:
          DeliveryDocument: rest.DeliveryDocument
        outputParameters:
        - type: object
          mapping: $.
