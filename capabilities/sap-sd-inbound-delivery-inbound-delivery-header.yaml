naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Inbound Delivery API — Inbound Delivery Header
  description: 'SAP Sales and Distribution (SD) SAP Inbound Delivery API — Inbound Delivery Header. 6 operations. Lead operation:
    Retrieve a list of inbound deliveries. Self-contained Naftiko capability covering one Sap Sales And Distribution Sd business
    surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Inbound Delivery Header
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
