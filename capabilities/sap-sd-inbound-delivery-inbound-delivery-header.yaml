    description: SAP Sales and Distribution (SD) SAP Inbound Delivery API — Inbound Delivery Header business capability. Self-contained,
      no shared references.
    resources:
    - name: A_InbDeliveryHeader
      path: /A_InbDeliveryHeader
      operations:
      - name: listinbounddeliveries
        method: GET
        description: Retrieve a list of inbound deliveries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createinbounddelivery
        method: POST
        description: Create a new inbound delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: A_InbDeliveryHeader('{DeliveryDocument}')
      path: /A_InbDeliveryHeader('{DeliveryDocument}')
      operations:
      - name: getinbounddelivery
        method: GET
        description: Retrieve a single inbound delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: DeliveryDocument
          in: path
          type: string
          description: Delivery document number (10 characters)
          required: true
      - name: updateinbounddelivery
        method: PATCH
        description: Update an inbound delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: DeliveryDocument
          in: path
          type: string
          description: Delivery document number
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteinbounddelivery
        method: DELETE
        description: Delete an inbound delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: DeliveryDocument
          in: path
          type: string
          description: Delivery document number
          required: true
    - name: PostGoodsReceipt
      path: /PostGoodsReceipt
      operations:
      - name: postgoodsreceipt
        method: POST
        description: Post goods receipt for an inbound delivery
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: DeliveryDocument
          in: query
          type: string
          description: Delivery document number
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
