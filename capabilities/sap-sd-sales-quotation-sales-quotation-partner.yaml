naftiko: 1.0.0-alpha2
info:
  label: SAP Sales and Distribution (SD) SAP Sales Quotation API — Sales Quotation Partner
  description: 'SAP Sales and Distribution (SD) SAP Sales Quotation API — Sales Quotation Partner. 1 operations. Lead operation:
    Retrieve partners for a sales quotation. Self-contained Naftiko capability covering one Sap Sales And Distribution Sd
    business surface.'
  tags:
  - Sap Sales And Distribution Sd
  - Sales Quotation Partner
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SAP_SALES_AND_DISTRIBUTION_SD_API_KEY: SAP_SALES_AND_DISTRIBUTION_SD_API_KEY
capability:
  consumes:
  - type: http
    namespace: sap-sd-sales-quotation-sales-quotation-partner
    baseUri: https://sandbox.api.sap.com/s4hanacloud/sap/opu/odata/sap/API_SALES_QUOTATION_SRV
    description: SAP Sales and Distribution (SD) SAP Sales Quotation API — Sales Quotation Partner business capability. Self-contained,
      no shared references.
    resources:
    - name: A_SalesQuotation('{SalesQuotation}')-to_Partner
      path: /A_SalesQuotation('{SalesQuotation}')/to_Partner
      operations:
      - name: listsalesquotationpartners
        method: GET
        description: Retrieve partners for a sales quotation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: SalesQuotation
          in: path
          type: string
          description: Sales quotation number
          required: true
    authentication:
      type: bearer
      token: '{{env.SAP_SALES_AND_DISTRIBUTION_SD_API_KEY}}'
  exposes:
  - type: rest
    namespace: sap-sd-sales-quotation-sales-quotation-partner-rest
    port: 8080
    description: REST adapter for SAP Sales and Distribution (SD) SAP Sales Quotation API — Sales Quotation Partner. One Spectral-compliant
      resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/a-salesquotation-salesquotation/to-partner
      name: a-salesquotation-salesquotation-to-partner
      description: REST surface for A_SalesQuotation('{SalesQuotation}')-to_Partner.
      operations:
      - method: GET
        name: listsalesquotationpartners
        description: Retrieve partners for a sales quotation
        call: sap-sd-sales-quotation-sales-quotation-partner.listsalesquotationpartners
        with:
          SalesQuotation: rest.SalesQuotation
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: sap-sd-sales-quotation-sales-quotation-partner-mcp
    port: 9090
    transport: http
    description: MCP adapter for SAP Sales and Distribution (SD) SAP Sales Quotation API — Sales Quotation Partner. One tool
      per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: retrieve-partners-sales-quotation
      description: Retrieve partners for a sales quotation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: sap-sd-sales-quotation-sales-quotation-partner.listsalesquotationpartners
      with:
        SalesQuotation: tools.SalesQuotation
      outputParameters:
      - type: object
        mapping: $.
