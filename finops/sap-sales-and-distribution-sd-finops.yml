description: 'FOCUS-aligned FinOps shape for SAP Sales and Distribution (SD): module of SAP S/4HANA, licensed
  under the customer''s S/4HANA / RISE-with-SAP agreement. Costs are absorbed into the parent S/4HANA
  contract; no per-API pricing.'
notes: SAP Sales and Distribution (SD) is a module of SAP S/4HANA / ECC and is licensed as part of the
  customer's broader S/4HANA agreement; it is not sold or priced as a standalone API product. No public
  pricing exists.
