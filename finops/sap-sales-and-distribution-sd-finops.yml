principles:
- name: Visibility
  description: Consumption visibility comes from the SAP Sales and Distribution (SD) account / partner
    reporting surface (invoices, account dashboards) rather than a public usage API.
- name: Allocation
  description: Allocate cost through the SAP Sales and Distribution (SD) contract structure (entitlement,
    project, business unit) and reconcile against internal cost centers.
- name: Optimization
  description: 'Optimization levers are commercial: renegotiation cadence, commitment sizing, and consolidation
    of SAP Sales and Distribution (SD) entitlements.'
- name: Accountability
  description: Assign a contract owner who reconciles SAP Sales and Distribution (SD) invoices against
    contracted entitlements each billing cycle.
